<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZWIFT RACING HUD — RH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:     #080b0f;
    --bg2:    #0d1117;
    --bg3:    #111820;
    --border: #2a3f54;
    --dim:    #5a7a96;
    --muted:  #8aafc8;
    --text:   #d8eaf8;
    --bright: #f0f8ff;
    --accent: #00aaff;
    --green:  #00e87a;
    --yellow: #f5c400;
    --red:    #ff2d55;
    --mono:   'Roboto Mono', monospace;
    --sans:   'Barlow Condensed', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text); font-family: var(--mono);
    height: 100vh; display: flex; flex-direction: column; overflow: hidden; user-select: none;
  }

  /* ── CONN BAR ── */
  #conn-bar {
    display: flex; align-items: center; gap: 8px; padding: 5px 10px;
    background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; font-size: 11px;
  }
  #conn-bar input {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    font-family: var(--mono); font-size: 11px; padding: 2px 7px;
    flex: 1; outline: none; border-radius: 2px; min-width: 0;
  }
  #conn-bar input:focus { border-color: var(--accent); }
  #conn-bar button {
    background: var(--border); border: 1px solid var(--dim); color: var(--bright);
    font-family: var(--mono); font-size: 11px; padding: 2px 10px;
    cursor: pointer; border-radius: 2px; flex-shrink: 0;
  }
  #conn-bar button:hover { background: var(--dim); }
  #status-dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    background: var(--muted); transition: background 0.3s;
  }
  #status-dot.connected    { background: var(--green); box-shadow: 0 0 6px var(--green); }
  #status-dot.connecting   { background: var(--yellow); animation: blink 1s infinite; }
  #status-dot.disconnected { background: var(--red); }
  #status-text { color: var(--muted); flex-shrink: 0; }
  #last-update { margin-left: auto; color: var(--dim); font-size: 10px; flex-shrink: 0; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* ── OUTER LAYOUT ── */
  #sections {
    flex: 1; display: flex; flex-direction: column;
    gap: 1px; background: var(--border); overflow: hidden;
  }
  .section {
    background: var(--bg); display: flex; flex-direction: column; min-height: 0; overflow: hidden;
  }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 12px; background: var(--bg2);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .section-title {
    font-family: var(--sans); font-size: 11px; font-weight: 600;
    letter-spacing: 0.14em; color: var(--dim); text-transform: uppercase;
  }
  .section-meta { font-size: 11px; color: var(--muted); }

  /* Position strip — fixed height */
  #sec-position { flex: 0 0 auto; }

  /* Map — fills remaining space */
  #sec-map { flex: 1; min-height: 0; }
  #sec-map .section-body { flex: 1; min-height: 0; position: relative; }

  /* Bottom row — ~33vh, groups + chat side by side */
  #bottom-row {
    flex: 0 0 33vh; display: flex; flex-direction: row;
    gap: 1px; background: var(--border); min-height: 0;
  }
  #sec-groups { flex: 1; min-width: 0; }
  #sec-chat   { flex: 1; min-width: 0; }

  /* ── POSITION ── */
  #position-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 1px; background: var(--border);
  }
  .pos-cell { background: var(--bg); padding: 10px 14px; }
  .pos-label {
    font-family: var(--sans); font-size: 11px; font-weight: 600;
    letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; margin-bottom: 3px;
  }
  .pos-val  { font-size: 42px; font-weight: 500; line-height: 1; color: var(--bright); }
  .pos-sub  { font-size: 11px; color: var(--dim); margin-top: 4px; }
  #pos-rank-val { color: var(--accent); }
  .gap-dir-ahead  { color: var(--red); }
  .gap-dir-behind { color: var(--green); }
  .pos-name {
    font-family: var(--sans); font-size: 13px; color: var(--muted);
    margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ── MAP ── */
  #map-canvas {
    position: absolute; inset: 0; width: 100%; height: 100%; display: block;
  }
  #map-mode-badge {
    position: absolute; bottom: 6px; right: 8px;
    font-family: var(--sans); font-size: 10px; color: var(--dim);
    background: var(--bg2); border: 1px solid var(--border);
    padding: 1px 6px; border-radius: 2px; pointer-events: none;
  }
  #map-waiting {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: var(--dim);
  }

  /* ── GROUPS ── */
  #sec-groups .section-body { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  #groups-wrap {
    flex: 1; overflow-y: auto; overflow-x: hidden; padding: 6px 8px;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  #groups-timeline {
    position: relative; padding-left: 18px; display: flex; flex-direction: column;
  }
  #groups-timeline::before {
    content: ''; position: absolute; left: 6px; top: 10px; bottom: 10px;
    width: 2px; background: linear-gradient(to bottom, var(--red) 0%, var(--border) 40%, var(--border) 60%, var(--green) 100%);
  }
  .group-row {
    position: relative; display: flex; flex-direction: column; gap: 3px; padding: 6px 0 6px 8px;
  }
  .group-row + .group-row { border-top: 1px solid rgba(42,63,84,0.4); }
  .group-dot {
    position: absolute; left: -14px; top: 12px;
    width: 9px; height: 9px; border-radius: 50%;
    border: 2px solid var(--border); background: var(--bg3);
  }
  .group-row.is-self .group-dot {
    background: var(--accent); border-color: var(--accent); box-shadow: 0 0 5px var(--accent);
  }
  .group-header { display: flex; align-items: baseline; gap: 7px; flex-wrap: wrap; }
  .group-label {
    font-family: var(--sans); font-size: 11px; font-weight: 700;
    letter-spacing: 0.08em; color: var(--dim); text-transform: uppercase;
  }
  .group-row.is-self .group-label { color: var(--accent); }
  .group-gap-badge {
    font-family: var(--sans); font-size: 11px; padding: 1px 6px; border-radius: 2px; font-weight: 600;
  }
  .group-gap-badge.ahead  { color: var(--red);   background: rgba(255,45,85,0.12); }
  .group-gap-badge.behind { color: var(--green); background: rgba(0,232,122,0.10); }
  .group-gap-badge.self   { color: var(--accent); background: rgba(0,170,255,0.10); }
  .group-stats { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .gstat { display: flex; align-items: baseline; gap: 3px; }
  .gstat-val  { font-size: 16px; font-weight: 400; color: var(--bright); }
  .gstat-unit { font-family: var(--sans); font-size: 10px; color: var(--dim); }
  .group-size-bar { display: flex; align-items: center; gap: 5px; }
  .gbar-track { height: 3px; flex: 1; max-width: 80px; background: var(--bg3); border-radius: 1px; overflow: hidden; }
  .gbar-fill  { height: 100%; border-radius: 1px; transition: width 0.6s ease; }
  .gbar-label { font-family: var(--sans); font-size: 10px; color: var(--dim); }
  .group-my-pos {
    font-family: var(--sans); font-size: 10px; color: var(--muted);
    background: rgba(0,170,255,0.07); border: 1px solid rgba(0,170,255,0.15);
    padding: 1px 6px; border-radius: 2px; align-self: flex-start;
  }
  .inter-group-gap {
    display: flex; align-items: center; gap: 6px;
    padding: 2px 0 2px 8px; font-size: 10px; color: var(--dim);
    font-family: var(--sans); letter-spacing: 0.06em;
  }
  .inter-group-gap::before { content: '↕'; font-size: 9px; color: var(--border); }
  .no-data {
    display: flex; align-items: center; justify-content: center;
    height: 40px; font-size: 11px; color: var(--dim);
  }

  /* ── CHAT ── */
  #sec-chat .section-body { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  #chat-wrap {
    flex: 1; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column-reverse;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent; padding: 5px 8px;
  }
  #chat-inner { display: flex; flex-direction: column; gap: 2px; }
  .chat-msg {
    display: grid; grid-template-columns: auto 1fr;
    column-gap: 6px; align-items: baseline;
    padding: 3px 0; border-bottom: 1px solid rgba(42,63,84,0.2);
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:none} }
  .chat-name {
    font-family: var(--sans); font-size: 12px; font-weight: 600; color: var(--accent);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px;
  }
  .chat-name.self-name { color: var(--yellow); }
  .chat-text { font-size: 11px; color: var(--text); line-height: 1.35; word-break: break-word; }
  #chat-status {
    padding: 3px 8px; background: var(--bg2); border-top: 1px solid var(--border);
    font-family: var(--sans); font-size: 10px; color: var(--dim); flex-shrink: 0;
    display: flex; align-items: center; gap: 5px;
  }
  #chat-status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--dim); flex-shrink: 0; }
  #chat-status-dot.ok  { background: var(--green); }
  #chat-status-dot.err { background: var(--red); }

  /* ── FOOTER ── */
  #footer {
    display: flex; gap: 16px; padding: 3px 10px;
    background: var(--bg2); border-top: 1px solid var(--border);
    font-size: 10px; color: var(--dim); flex-shrink: 0;
  }
</style>
</head>
<body>

<div id="conn-bar">
  <div id="status-dot" class="disconnected"></div>
  <span id="status-text">disconnected</span>
  <input id="sauce-host" type="text" value="localhost:1080" placeholder="host:port" />
  <button id="connect-btn">Connect</button>
  <span id="last-update"></span>
</div>

<div id="sections">

  <!-- POSITION -->
  <div class="section" id="sec-position">
    <div class="section-header">
      <span class="section-title">Race Position</span>
      <span class="section-meta" id="pos-event-label"></span>
    </div>
    <div id="position-grid">
      <div class="pos-cell">
        <div class="pos-label">Position</div>
        <div class="pos-val" id="pos-rank-val">—</div>
        <div class="pos-sub" id="pos-of">of — riders</div>
      </div>
      <div class="pos-cell">
        <div class="pos-label">Gap Ahead</div>
        <div class="pos-val gap-dir-ahead" id="pos-gap-ahead">—</div>
        <div class="pos-name" id="pos-name-ahead"></div>
      </div>
      <div class="pos-cell">
        <div class="pos-label">Gap Behind</div>
        <div class="pos-val gap-dir-behind" id="pos-gap-behind">—</div>
        <div class="pos-name" id="pos-name-behind"></div>
      </div>
    </div>
  </div>

  <!-- MAP -->
  <div class="section" id="sec-map">
    <div class="section-header">
      <span class="section-title">Map</span>
      <span class="section-meta" id="map-meta"></span>
    </div>
    <div class="section-body">
      <canvas id="map-canvas"></canvas>
      <div id="map-mode-badge">waiting…</div>
      <div id="map-waiting">Waiting for data…</div>
    </div>
  </div>

  <!-- BOTTOM ROW -->
  <div id="bottom-row">

    <div class="section" id="sec-groups">
      <div class="section-header">
        <span class="section-title">Groups</span>
        <span class="section-meta" id="groups-meta"></span>
      </div>
      <div class="section-body">
        <div id="groups-wrap">
          <div class="no-data" id="no-groups">Waiting…</div>
          <div id="groups-timeline" style="display:none"></div>
        </div>
      </div>
    </div>

    <div class="section" id="sec-chat">
      <div class="section-header">
        <span class="section-title">Chat</span>
        <span class="section-meta" id="chat-meta"></span>
      </div>
      <div class="section-body">
        <div id="chat-wrap"><div id="chat-inner"></div></div>
        <div id="chat-status">
          <div id="chat-status-dot"></div>
          <span id="chat-status-text">probing…</span>
        </div>
      </div>
    </div>

  </div><!-- /bottom-row -->

</div><!-- /sections -->

<div id="footer">
  <span>PKT <span id="f-packets">0</span></span>
  <span>GRP <span id="f-groupcount">—</span></span>
  <span>EVT <span id="f-evtsub">—</span></span>
</div>

<script>
const MAX_CHAT = 80;
const POLL_MS  = 1000;
const $ = id => document.getElementById(id);

const state = {
  pollTimer: null, chatTimer: null,
  selfId: null, selfEventSubgroup: null,
  nearbyRaw: [], groupsRaw: [],
  polls: 0, connected: false,
  chatEnabled: null, chatSeenIds: new Set(),
  chatProbed: false,
  routeShape: null,
  mapMode: 'waiting',
  routeProbed: false,
};

function getHost() { return $('sauce-host').value.trim() || 'localhost:1080'; }
function apiUrl(p) { return `http://${getHost()}/api/${p}`; }

// ── CONNECT ───────────────────────────────────────────────────────────────
function connect() {
  if (state.pollTimer) { clearInterval(state.pollTimer); state.pollTimer = null; }
  if (state.chatTimer) { clearInterval(state.chatTimer); state.chatTimer = null; }
  state.connected = false;
  state.chatProbed = false;
  state.routeProbed = false;
  state.chatEnabled = null;
  state.routeShape  = null;
  state.mapMode     = 'waiting';
  $('map-waiting').style.display = 'flex';
  $('map-mode-badge').textContent = 'waiting…';
  setStatus('connecting', getHost());
  poll().then(() => {
    state.pollTimer = setInterval(poll, POLL_MS);
    probeChatEndpoint();
    probeRouteShape();
  }).catch(() => setStatus('disconnected', 'unreachable'));
}

async function poll() {
  try {
    const [nr, gr] = await Promise.all([
      fetch(apiUrl('nearby/v2?resource=state&resource=athlete&resource=stats&stats=true'), { signal: AbortSignal.timeout(2000) }),
      fetch(apiUrl('groups/v2?resource=state&resource=athlete&resource=stats&stats=true'), { signal: AbortSignal.timeout(2000) }),
    ]);
    if (!state.connected) { state.connected = true; setStatus('connected', getHost()); }
    state.polls++;
    $('f-packets').textContent   = state.polls;
    $('last-update').textContent = new Date().toLocaleTimeString();

    if (nr.ok) {
      const d = await nr.json();
      state.nearbyRaw = Array.isArray(d) ? d : (d.data ?? []);
      processNearby(state.nearbyRaw);
    }
    if (gr.ok) {
      const d = await gr.json();
      state.groupsRaw = Array.isArray(d) ? d : (d.data ?? []);
      processGroups(state.groupsRaw);
    }

    // Re-evaluate map mode if we haven't locked in yet
    if (state.mapMode === 'waiting' && state.routeProbed) {
      const hasXY = state.nearbyRaw.some(r => r.state?.x != null || r.state?.roadPosition != null);
      if (hasXY) {
        state.mapMode = 'scatter';
        $('map-meta').textContent = 'position scatter';
        $('map-mode-badge').textContent = 'scatter';
        $('map-waiting').style.display = 'none';
      } else if (state.nearbyRaw.some(r => r.gap != null)) {
        state.mapMode = 'gap';
        $('map-meta').textContent = 'gap chart';
        $('map-mode-badge').textContent = 'gap chart';
        $('map-waiting').style.display = 'none';
      }
    }

    drawMap();
  } catch {
    if (state.connected) { state.connected = false; setStatus('disconnected', 'lost connection'); }
  }
}

function setStatus(cls, txt) { $('status-dot').className = cls; $('status-text').textContent = txt; }

// ── POSITION ──────────────────────────────────────────────────────────────
function processNearby(riders) {
  const self = riders.find(r => r.watching === true);
  if (self) {
    state.selfId = self.athleteId || self.id;
    state.selfEventSubgroup = self.state?.eventSubgroupId ?? null;
    if (state.selfEventSubgroup) $('f-evtsub').textContent = state.selfEventSubgroup;
  }

  const sub = state.selfEventSubgroup;
  const inEvent = sub !== null
    ? riders.filter(r => { const rs = r.state?.eventSubgroupId ?? null; return rs === null || rs === sub; })
    : riders;

  const sorted  = [...inEvent].sort((a,b) => (a.gap ?? 0) - (b.gap ?? 0));
  const selfIdx = sorted.findIndex(r => r.watching === true);

  $('pos-rank-val').textContent  = selfIdx >= 0 ? selfIdx + 1 : '—';
  $('pos-of').textContent        = `of ${sorted.length} riders`;
  $('pos-event-label').textContent = sub ? `evt ${sub}` : '';

  const ahead = selfIdx > 0 ? sorted[selfIdx - 1] : null;
  if (ahead?.gap != null) {
    $('pos-gap-ahead').textContent  = formatGap(Math.abs(ahead.gap));
    $('pos-name-ahead').textContent = riderName(ahead, 18);
  } else {
    $('pos-gap-ahead').textContent  = selfIdx === 0 ? 'Leader' : '—';
    $('pos-name-ahead').textContent = '';
  }

  const behind = selfIdx >= 0 && selfIdx < sorted.length - 1 ? sorted[selfIdx + 1] : null;
  if (behind?.gap != null) {
    $('pos-gap-behind').textContent  = formatGap(Math.abs(behind.gap));
    $('pos-name-behind').textContent = riderName(behind, 18);
  } else {
    $('pos-gap-behind').textContent  = selfIdx === sorted.length - 1 ? 'Last' : '—';
    $('pos-name-behind').textContent = '';
  }
}

// ── GROUPS ────────────────────────────────────────────────────────────────
function processGroups(groups) {
  if (!groups || !groups.length) {
    $('no-groups').style.display   = 'flex';
    $('groups-timeline').style.display = 'none';
    $('groups-meta').textContent   = '';
    $('f-groupcount').textContent  = '0';
    return;
  }

  const normalized = groups.map((g, gi) => {
    const riders = g.riders ?? g.athletes ?? g.data ?? [];
    const isSelfGroup = riders.some(r => r.watching === true || (state.selfId && (r.athleteId || r.id) === state.selfId));

    let gapSec = g.gap ?? g.gapToLeader ?? null;
    if (gapSec === null && riders.length > 0) {
      const gaps = riders.map(r => r.gap ?? null).filter(x => x !== null);
      if (gaps.length) gapSec = gaps.reduce((a,b) => a+b, 0) / gaps.length;
    }

    let wkgSum = 0, wkgCount = 0;
    riders.forEach(r => {
      const pwr = r.state?.power ?? null, wt = r.athlete?.weight ?? null;
      if (pwr !== null && wt) { wkgSum += pwr / wt; wkgCount++; }
    });

    return { idx: gi, riders, riderCount: riders.length, gapSec,
             avgWkg: wkgCount > 0 ? wkgSum / wkgCount : null, isSelf: isSelfGroup };
  });

  normalized.sort((a,b) => (a.gapSec ?? 0) - (b.gapSec ?? 0));
  $('groups-meta').textContent  = `${normalized.length} grp${normalized.length !== 1 ? 's' : ''}`;
  $('f-groupcount').textContent = normalized.length;

  const maxSize = Math.max(...normalized.map(g => g.riderCount), 1);
  $('no-groups').style.display = 'none';
  const tl = $('groups-timeline');
  tl.style.display = 'flex';
  tl.innerHTML = '';

  normalized.forEach((g, vi) => {
    if (vi > 0) {
      const prev = normalized[vi - 1];
      const ig   = (g.gapSec !== null && prev.gapSec !== null) ? Math.abs((g.gapSec??0)-(prev.gapSec??0)) : null;
      if (ig !== null) {
        const d = document.createElement('div');
        d.className = 'inter-group-gap';
        d.textContent = formatGap(ig);
        tl.appendChild(d);
      }
    }

    const row = document.createElement('div');
    row.className = 'group-row' + (g.isSelf ? ' is-self' : '');

    const dot = document.createElement('div');
    dot.className = 'group-dot';
    row.appendChild(dot);

    const header = document.createElement('div');
    header.className = 'group-header';

    const lbl = document.createElement('span');
    lbl.className = 'group-label';
    lbl.textContent = g.isSelf ? '▶ Your Group' : `Grp ${vi + 1}`;
    header.appendChild(lbl);

    if (g.gapSec !== null) {
      const badge = document.createElement('span');
      if (g.isSelf) {
        badge.className = 'group-gap-badge self'; badge.textContent = 'HERE';
      } else {
        const isAhead = (g.gapSec ?? 0) < 0;
        badge.className = `group-gap-badge ${isAhead ? 'ahead' : 'behind'}`;
        badge.textContent = (isAhead ? '−' : '+') + formatGap(Math.abs(g.gapSec));
      }
      header.appendChild(badge);
    }
    row.appendChild(header);

    const stats = document.createElement('div');
    stats.className = 'group-stats';
    if (g.avgWkg !== null) {
      const ws = document.createElement('div');
      ws.className = 'gstat';
      ws.innerHTML = `<span class="gstat-val">${g.avgWkg.toFixed(1)}</span><span class="gstat-unit">w/kg</span>`;
      stats.appendChild(ws);
    }
    const cs = document.createElement('div');
    cs.className = 'gstat';
    cs.innerHTML = `<span class="gstat-val">${g.riderCount}</span><span class="gstat-unit">rider${g.riderCount !== 1 ? 's' : ''}</span>`;
    stats.appendChild(cs);
    row.appendChild(stats);

    const sizeBar = document.createElement('div');
    sizeBar.className = 'group-size-bar';
    const pct = Math.round((g.riderCount / maxSize) * 100);
    sizeBar.innerHTML = `<div class="gbar-track"><div class="gbar-fill" style="width:${pct}%;background:${g.isSelf?'var(--accent)':'var(--border)'}"></div></div><span class="gbar-label">${g.riderCount}</span>`;
    row.appendChild(sizeBar);

    if (g.isSelf && g.riders.length > 0) {
      const sorted2 = [...g.riders].sort((a,b) => (a.gap??0) - (b.gap??0));
      const posInGroup = sorted2.findIndex(r => r.watching === true || (state.selfId && (r.athleteId||r.id) === state.selfId));
      if (posInGroup >= 0) {
        const mp = document.createElement('div');
        mp.className = 'group-my-pos';
        mp.textContent = `P${posInGroup + 1} of ${g.riders.length} in group`;
        row.appendChild(mp);
      }
    }

    tl.appendChild(row);
  });
}

// ── MAP ───────────────────────────────────────────────────────────────────
const ROUTE_CANDIDATES = [
  'worlds/v1', 'route/v1', 'routes/v1', 'segment/v1', 'segments/v1', 'course/v1',
];

async function probeRouteShape() {
  if (state.routeProbed) return;
  state.routeProbed = true;

  for (const ep of ROUTE_CANDIDATES) {
    try {
      const res = await fetch(apiUrl(ep), { signal: AbortSignal.timeout(2000) });
      if (!res.ok) continue;
      const d = await res.json();
      const shape = extractRouteShape(d);
      if (shape && shape.length >= 10) {
        state.routeShape = shape;
        state.mapMode    = 'route';
        $('map-meta').textContent       = `route · ${shape.length} pts`;
        $('map-mode-badge').textContent = 'route map';
        $('map-waiting').style.display  = 'none';
        return;
      }
    } catch {}
  }
  // Fallback resolved in poll() once rider data arrives
}

function extractRouteShape(d) {
  const candidates = [
    d?.road?.points, d?.points, d?.geometry?.coordinates,
    d?.route?.points, d?.shape, d?.path,
    Array.isArray(d) ? d : null,
  ];
  for (const c of candidates) {
    if (!Array.isArray(c) || c.length < 2) continue;
    const f = c[0];
    if (f?.x != null && f?.y != null)         return c.map(p => ({ x: p.x,         y: p.y }));
    if (f?.lat != null)                        return c.map(p => ({ x: p.lng??p.lon, y: p.lat }));
    if (f?.latitude != null)                   return c.map(p => ({ x: p.longitude,  y: p.latitude }));
    if (Array.isArray(f) && f.length >= 2)     return c.map(p => ({ x: p[0],         y: p[1] }));
  }
  return null;
}

function fitBounds(pts, W, H, pad) {
  const xs = pts.map(p => p.x), ys = pts.map(p => p.y);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const rangeX = maxX - minX || 1, rangeY = maxY - minY || 1;
  const scale  = Math.min((W - pad*2) / rangeX, (H - pad*2) / rangeY);
  const offX   = pad + ((W - pad*2) - rangeX * scale) / 2;
  const offY   = pad + ((H - pad*2) - rangeY * scale) / 2;
  return pt => ({ cx: offX + (pt.x - minX) * scale, cy: offY + (pt.y - minY) * scale });
}

function drawMap() {
  const canvas = $('map-canvas');
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.clientWidth, H = canvas.clientHeight;
  if (!W || !H) return;
  if (canvas.width !== W * dpr || canvas.height !== H * dpr) {
    canvas.width = W * dpr; canvas.height = H * dpr;
  }
  const ctx = canvas.getContext('2d');
  ctx.save(); ctx.scale(dpr, dpr); ctx.clearRect(0, 0, W, H);

  if      (state.mapMode === 'route')   drawRouteMap(ctx, W, H);
  else if (state.mapMode === 'scatter') drawScatterMap(ctx, W, H);
  else if (state.mapMode === 'gap')     drawGapChart(ctx, W, H);

  ctx.restore();
}

function drawRouteMap(ctx, W, H) {
  const shape  = state.routeShape;
  const riders = state.nearbyRaw;
  if (!shape || shape.length < 2) return;

  const project = fitBounds(shape, W, H, 16);

  // Route line
  ctx.beginPath();
  ctx.strokeStyle = '#1e3248'; ctx.lineWidth = 3; ctx.lineJoin = 'round';
  shape.forEach((pt, i) => {
    const { cx, cy } = project(pt);
    i === 0 ? ctx.moveTo(cx, cy) : ctx.lineTo(cx, cy);
  });
  ctx.stroke();

  riders.forEach(r => {
    const st = r.state ?? {};
    let cx, cy;
    if (st.x != null && st.y != null) {
      ({ cx, cy } = project({ x: st.x, y: st.y }));
    } else if (st.roadPosition != null) {
      const pos = Math.max(0, Math.min(1, st.roadPosition));
      const fi  = pos * (shape.length - 1);
      const idx = Math.floor(fi), frac = fi - idx;
      const a   = shape[Math.min(idx, shape.length-1)];
      const b   = shape[Math.min(idx+1, shape.length-1)];
      ({ cx, cy } = project({ x: a.x + (b.x-a.x)*frac, y: a.y + (b.y-a.y)*frac }));
    } else { return; }

    const isSelf = r.watching === true;
    if (isSelf) {
      ctx.beginPath(); ctx.arc(cx, cy, 8, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(0,170,255,0.15)'; ctx.fill();
      ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI*2);
      ctx.fillStyle = '#00aaff'; ctx.fill();
    } else if (!isRiderBot(r)) {
      ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI*2);
      ctx.fillStyle = '#2a5a7a'; ctx.fill();
    }
  });
}

function drawScatterMap(ctx, W, H) {
  const riders = state.nearbyRaw.filter(r => r.state?.x != null && r.state?.y != null);
  if (!riders.length) return;
  const project = fitBounds(riders.map(r => ({ x: r.state.x, y: r.state.y })), W, H, 20);
  riders.forEach(r => {
    const { cx, cy } = project({ x: r.state.x, y: r.state.y });
    const isSelf = r.watching === true;
    ctx.beginPath(); ctx.arc(cx, cy, isSelf ? 5 : 3, 0, Math.PI*2);
    ctx.fillStyle = isSelf ? '#00aaff' : '#2a5a7a'; ctx.fill();
  });
}

function drawGapChart(ctx, W, H) {
  // Horizontal: left = ahead (negative gap), right = behind (positive gap)
  const sub    = state.selfEventSubgroup;
  const riders = state.nearbyRaw.filter(r => r.gap != null && (sub === null || (r.state?.eventSubgroupId ?? sub) === sub));
  if (!riders.length) return;

  const sorted = [...riders].sort((a,b) => a.gap - b.gap);
  const gaps   = sorted.map(r => r.gap);
  const minG   = Math.min(...gaps), maxG = Math.max(...gaps);
  const range  = Math.max(maxG - minG, 1);
  const PAD    = 28, trackY = H / 2;

  // Track
  ctx.fillStyle = '#1a2a3a';
  ctx.fillRect(PAD, trackY - 1, W - PAD*2, 2);

  // Axis labels
  ctx.font = "9px 'Barlow Condensed'"; ctx.fillStyle = '#2a3f54';
  ctx.textAlign = 'left';  ctx.fillText('← ahead',  PAD,       trackY - 12);
  ctx.textAlign = 'right'; ctx.fillText('behind →', W - PAD,   trackY - 12);

  sorted.forEach(r => {
    const isSelf = r.watching === true;
    const isBot  = isRiderBot(r);
    const x = PAD + ((r.gap - minG) / range) * (W - PAD*2);

    if (isSelf) {
      // Glow ring
      ctx.beginPath(); ctx.arc(x, trackY, 9, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(0,170,255,0.12)'; ctx.fill();
      // Core
      ctx.beginPath(); ctx.arc(x, trackY, 5, 0, Math.PI*2);
      ctx.fillStyle = '#00aaff'; ctx.fill();
      // YOU label
      ctx.font = "bold 9px 'Barlow Condensed'"; ctx.fillStyle = '#00aaff';
      ctx.textAlign = 'center'; ctx.fillText('YOU', x, trackY - 14);
    } else {
      ctx.beginPath(); ctx.arc(x, trackY, isBot ? 2 : 3, 0, Math.PI*2);
      ctx.fillStyle = isBot ? '#162030' : '#2a5a7a'; ctx.fill();

      // Gap label for nearby riders (within 20s)
      if (!isBot && Math.abs(r.gap) < 20) {
        const lbl = formatGap(Math.abs(r.gap));
        ctx.font = "9px 'Barlow Condensed'";
        ctx.fillStyle = r.gap < 0 ? '#ff2d55' : '#00e87a';
        ctx.textAlign = 'center';
        ctx.fillText(lbl, x, trackY + (r.gap < 0 ? -10 : 16));
      }
    }
  });
  ctx.textAlign = 'left';
}

// ── CHAT ──────────────────────────────────────────────────────────────────
const CHAT_CANDIDATES = ['chat/v1','chat/v2','rpc/v1/chat','events/chat/v1'];

async function probeChatEndpoint() {
  if (state.chatProbed) return;
  state.chatProbed = true;
  setChatStatus('probing…', false);

  for (const ep of CHAT_CANDIDATES) {
    try {
      const res = await fetch(apiUrl(ep), { signal: AbortSignal.timeout(2000) });
      if (res.ok) {
        const d    = await res.json();
        const msgs = Array.isArray(d) ? d : (d.messages ?? d.data ?? null);
        if (msgs !== null) {
          state.chatEnabled = ep;
          setChatStatus(`live · ${ep}`, true);
          processChatMessages(msgs);
          state.chatTimer = setInterval(pollChat, 2000);
          return;
        }
      }
    } catch {}
  }

  try {
    const res = await fetch(apiUrl('rpc/v1'), { signal: AbortSignal.timeout(2000) });
    if (res.ok) {
      const d         = await res.json();
      const endpoints = Array.isArray(d) ? d : Object.keys(d ?? {});
      const chatLike  = endpoints.filter(e => /chat|message|msg|feed/i.test(String(e)));
      if (chatLike.length) { setChatStatus(`candidates: ${chatLike.slice(0,2).join(', ')}`, false); return; }
    }
  } catch {}

  setChatStatus('not available', false);
  appendChatSystem('Chat endpoint not found on this Sauce build.');
}

async function pollChat() {
  if (!state.chatEnabled) return;
  try {
    const res  = await fetch(apiUrl(state.chatEnabled), { signal: AbortSignal.timeout(2000) });
    if (!res.ok) return;
    const d    = await res.json();
    const msgs = Array.isArray(d) ? d : (d.messages ?? d.data ?? []);
    processChatMessages(msgs);
  } catch {}
}

function processChatMessages(msgs) {
  if (!Array.isArray(msgs)) return;
  let added = 0;
  msgs.forEach(m => {
    const id = m.id ?? m.ts ?? m.timestamp ?? JSON.stringify(m).slice(0,40);
    if (state.chatSeenIds.has(id)) return;
    state.chatSeenIds.add(id);
    appendChatMessage(m);
    added++;
  });
  if (added) $('chat-meta').textContent = `${state.chatSeenIds.size}`;
  if (state.chatSeenIds.size > 2000) state.chatSeenIds = new Set([...state.chatSeenIds].slice(-1000));
}

function appendChatMessage(m) {
  const from   = m.from ?? m.name ?? m.athlete?.fullname ?? m.sender ?? '?';
  const text   = m.message ?? m.text ?? m.body ?? m.msg ?? '';
  const isSelf = m.watching === true || (state.selfId && (m.athleteId || m.id) === state.selfId);
  const inner  = $('chat-inner');
  while (inner.children.length >= MAX_CHAT) inner.removeChild(inner.firstChild);
  const div = document.createElement('div');
  div.className = 'chat-msg';
  div.innerHTML = `<span class="chat-name ${isSelf?'self-name':''}" title="${escHtml(from)}">${escHtml(truncate(from,16))}</span><span class="chat-text">${escHtml(text)}</span>`;
  inner.appendChild(div);
}

function appendChatSystem(msg) {
  const div = document.createElement('div');
  div.style.cssText = 'padding:6px 0;font-size:10px;color:var(--dim);font-family:var(--sans);';
  div.textContent = msg;
  $('chat-inner').appendChild(div);
}

function setChatStatus(txt, ok) {
  $('chat-status-text').textContent = txt;
  $('chat-status-dot').className = ok ? 'ok' : 'err';
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function formatGap(s) {
  if (s == null) return '—';
  s = Math.abs(s);
  return s < 60 ? `${Math.round(s)}s` : `${Math.floor(s/60)}m${String(Math.round(s%60)).padStart(2,'0')}s`;
}
function riderName(r, len) {
  return truncate(r.athlete?.fullname || r.name || `#${r.athleteId ?? r.id ?? '?'}`, len);
}
function isRiderBot(r) {
  const name = (r.athlete?.fullname || r.name || '').toLowerCase();
  return name.includes('pace partner') || name.includes('bot') || (r.athlete?.id > 9000000);
}
function truncate(str, len) { return str.length > len ? str.slice(0,len-1)+'…' : str; }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── EVENTS ────────────────────────────────────────────────────────────────
$('connect-btn').addEventListener('click', () => {
  if (state.pollTimer) { clearInterval(state.pollTimer); state.pollTimer = null; }
  if (state.chatTimer) { clearInterval(state.chatTimer); state.chatTimer = null; }
  connect();
});
$('sauce-host').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (state.pollTimer) { clearInterval(state.pollTimer); state.pollTimer = null; }
  if (state.chatTimer) { clearInterval(state.chatTimer); state.chatTimer = null; }
  connect();
});
window.addEventListener('resize', drawMap);

connect();
</script>
